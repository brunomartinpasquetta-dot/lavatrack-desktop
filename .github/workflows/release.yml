# Publicación de releases de LavaTrack Desktop.
# Mismo patrón que StockFlow (brunomartinpasquetta-dot/stockflow-desktop): se dispara
# con el push de un tag vX.Y.Z, buildea en runners de GitHub (macOS + Windows) y publica
# los artefactos + latest*.yml a GitHub Releases (feed de electron-updater).
#
# Diferencias con StockFlow: LavaTrack usa npm (no pnpm) y NO corre electron-rebuild
# (usa node:sqlite nativo, no hay módulos nativos que compilar).
name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # crear el release y subir los artefactos con el GITHUB_TOKEN integrado

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Windows Defender escanea en tiempo real cada archivo que escribe makensis al
      # comprimir la app (~134 MB) → el build de NSIS se arrastra y parece colgado.
      # En vez de desactivar Defender entero, excluimos SOLO los directorios de trabajo:
      # el workspace y las caches de electron-builder (donde makensis escribe y comprime).
      - name: Acelerar I/O de Windows (exclusiones de antivirus en dirs de trabajo)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron-builder\Cache"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\electron\Cache"
          Add-MpPreference -ExclusionPath "$env:TEMP"
        continue-on-error: true

      - name: Instalar dependencias (server + client + electron)
        run: |
          npm --prefix server install
          npm --prefix client install
          npm --prefix electron install

      - name: Publicar (macOS)
        if: matrix.os == 'macos-latest'
        # GH_TOKEN: usa el PAT secrets.GH_TOKEN si existe; si no, cae al GITHUB_TOKEN
        # integrado (siempre presente). Sin token, electron-builder aborta.
        #
        # IMPORTANTE: NO pasar CSC_LINK/CSC_KEY_PASSWORD acá si no hay certificado.
        # Si el secret no existe, GitHub Actions lo inyecta como string vacío "", y
        # electron-builder lo interpreta como RUTA de certificado → intenta resolver ""
        # y falla con "⨯ .../electron not a file". Dejándolos SIN definir, saltea la
        # firma y genera un build sin firmar (Gatekeeper pedirá "Abrir de todos modos").
        # Para firmar en el futuro: cargar los secrets Y re-agregar estas dos env.
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm --prefix electron run publish:mac

      - name: Publicar (Windows)
        if: matrix.os == 'windows-latest'
        # Sin code signing: el .exe se publica sin firmar (SmartScreen pedirá
        # "Más información → Ejecutar de todas formas"). NO pasar CSC_LINK vacío acá.
        #
        # ELECTRON_BUILDER_BINARIES_MIRROR: electron-builder baja winCodeSign + nsis desde
        # github.com/electron-userland/electron-builder-binaries; esa descarga se cuelga de
        # forma intermitente en el runner de Windows. Se redirige a un mirror más estable.
        #
        # --config.compression=store: SOLO en Windows (no toca el build de mac, que usa
        # publish:mac con compresión normal). makensis con LZMA sobre ~134 MB es donde muere;
        # con 'store' el instalador es más pesado pero compila en minutos. Diagnóstico: si
        # ni así compila en 20 min, el approach de NSIS-en-CI está mal y no se insiste (fallback zip).
        # timeout 20min: si makensis no termina en 20, se corta rápido en vez de arrastrarse.
        timeout-minutes: 20
        # shell bash (disponible en el runner de Windows) para el script multilínea.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
        run: |
          npm --prefix client run build
          cd electron
          # Genera el .exe + latest.yml. --publish always intenta subir, pero si el release
          # v1.0.0 ya está publicado hace más de 2h electron-builder SALTEA la subida (regla
          # de seguridad). Igual deja los artefactos + latest.yml en dist-desktop.
          npx electron-builder --win --publish always --config.compression=store
          # Subida robusta al release existente con gh (no tiene la regla de 2h). --clobber
          # sobrescribe si ya existe. Así no se crea un release duplicado ni se toca el de mac.
          gh release upload v1.0.0 \
            dist-desktop/LavaTrack-1.0.0-setup.exe \
            dist-desktop/latest.yml \
            --clobber --repo "$GITHUB_REPOSITORY"
